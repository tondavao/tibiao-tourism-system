<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Portal - Tibiao Tourism</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/fonts.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/datadash.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../js/vendor/lucide.js"></script>
    <script src="../js/vendor/qrcode.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/vendor/chart.js"></script>
    <script src="../js/datadash.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        display: ['Montserrat', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            DEFAULT: '#10b981',
                            dark: '#059669',
                            light: '#d1fae5'
                        },
                        sidebar: '#064e3b'
                    }
                }
            }
        }
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .sidebar-transition { transition: transform 0.3s ease-in-out; }
        
        /* Required for dynamically injected tables by JS */
        .data-table { width: 100%; border-collapse: collapse; }
        .data-table th { text-align: left; padding: 1rem; color: #64748b; font-weight: 600; font-size: 0.85rem; border-bottom: 2px solid #f1f5f9; }
        .data-table td { padding: 1.25rem 1rem; border-bottom: 1px solid #f1f5f9; color: #334155; font-size: 0.95rem; }
        
        @media print {
            .no-print, #sidebar, header { display: none !important; }
            #content-area { margin: 0; padding: 0; width: 100%; }
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-800 antialiased overflow-hidden">
    
    <div id="dashboard-layout" class="flex h-screen w-full">
        <!-- Sidebar -->
        <aside id="sidebar" class="bg-gradient-to-b from-[#064e3b] to-[#01221a] text-white w-72 flex-shrink-0 flex flex-col shadow-xl z-20 sidebar-transition absolute lg:relative h-full -translate-x-full lg:translate-x-0">
            <div class="p-6 flex items-center gap-4 mb-4 border-b border-white/10">
                <div class="w-12 h-12 bg-white rounded-xl p-1 overflow-hidden shadow-lg shadow-primary/20">
                    <img src="../images/logo.png" alt="Logo" class="w-full h-full object-cover">
                </div>
                <span class="font-display text-xs font-black tracking-tight leading-tight max-w-[170px] uppercase text-emerald-100">Tourist Digital Logging & Monitoring System</span>
            </div>

            <ul class="flex-1 px-4 space-y-2 overflow-y-auto">
                <li onclick="showView('dashboard'); updateActiveNav(this)" class="nav-item active flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer font-medium transition-all bg-primary text-white shadow-lg shadow-emerald-900/50">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </li>
                <li onclick="showView('visitors'); updateActiveNav(this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <i data-lucide="users" class="w-5 h-5"></i> Visitor Logs
                </li>
                <li onclick="showView('payments'); updateActiveNav(this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <i data-lucide="banknote" class="w-5 h-5"></i> Payments
                </li>
                <li onclick="showView('reports'); updateActiveNav(this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <i data-lucide="trending-up" class="w-5 h-5"></i> Reports
                </li>
                <li onclick="showView('attendance'); updateActiveNav(this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <i data-lucide="clock" class="w-5 h-5"></i> Staff Time Log
                </li>
                <li onclick="showView('accounts'); updateActiveNav(this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <i data-lucide="user-cog" class="w-5 h-5"></i> Accounts
                </li>
                <li onclick="showView('settings'); updateActiveNav(this)" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer font-medium text-slate-400 hover:bg-white/5 hover:text-white transition-all">
                    <i data-lucide="settings" class="w-5 h-5"></i> Settings
                </li>
            </ul>

            <div class="p-4 border-t border-white/10 relative z-10">
                <button onclick="logout()" class="w-full flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer font-medium text-red-400 hover:bg-red-500/10 hover:text-red-300 transition-all">
                    <i data-lucide="power" class="w-5 h-5"></i> Logout
                </button>
            </div>
            
            <!-- Subtle Ecopark Silhouette Background -->
            <div class="absolute bottom-0 left-0 right-0 pointer-events-none opacity-[0.08] z-0 select-none">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" class="w-full h-auto text-emerald-300 fill-current">
                    <polygon points="5,40 12,18 19,40" />
                    <polygon points="12,40 20,10 28,40" />
                    <polygon points="22,40 28,22 34,40" />
                    <polygon points="30,40 38,15 46,40" />
                    <polygon points="40,40 48,5 56,40" />
                    <polygon points="50,40 56,25 62,40" />
                    <polygon points="58,40 65,12 72,40" />
                    <polygon points="68,40 75,20 82,40" />
                    <polygon points="78,40 85,8 92,40" />
                    <polygon points="88,40 94,22 100,40" />
                    <polygon points="96,40 104,15 112,40" />
                    <polygon points="108,40 115,25 120,40" />
                </svg>
            </div>
        </aside>

        <!-- Mobile Overlay -->
        <div id="sidebar-overlay" onclick="toggleSidebar()" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-10 hidden lg:hidden"></div>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col h-full relative overflow-hidden">
            <header class="bg-white border-b border-gray-200 h-20 px-6 lg:px-10 flex items-center justify-between shrink-0 sticky top-0 z-10 shadow-sm">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="lg:hidden p-2 text-gray-500 hover:bg-gray-100 rounded-xl transition-colors">
                        <i data-lucide="menu" class="w-6 h-6"></i>
                    </button>
                    <button id="back-btn-header" onclick="showView('dashboard')" style="display: none;" class="p-2 text-gray-500 hover:bg-gray-100 rounded-xl transition-colors">
                        <i data-lucide="arrow-left" class="w-5 h-5"></i>
                    </button>
                    <h2 id="view-title" class="font-display text-lg sm:text-2xl font-bold text-gray-800 tracking-tight truncate max-w-[150px] sm:max-w-none">Dashboard</h2>
                </div>
                
                <div class="flex items-center gap-3 px-3 py-2 bg-gray-50 border border-gray-100 rounded-2xl no-print">
                    <div class="text-right hidden md:block">
                        <div id="admin-profile-name" class="text-sm font-bold text-gray-800">Admin</div>
                        <div id="admin-profile-role" class="text-xs font-semibold text-primary uppercase tracking-wider">Administrator</div>
                    </div>
                    <div class="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center text-primary">
                        <i data-lucide="user" class="w-5 h-5"></i>
                    </div>
                </div>
            </header>

            <div id="content-area" class="flex-1 overflow-y-auto p-6 lg:p-10 bg-gray-50">
                <!-- Dynamic Content Injected Here by JS -->
            </div>
        </main>
    </div>

    <script src="../js/admin.js"></script>
    <script src="../js/sync-engine.js"></script>
    <script>
        lucide.createIcons();

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            if (sidebar.classList.contains('-translate-x-full')) {
                sidebar.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        // Helper to update active styling for nav items
        function updateActiveNav(clickedElement) {
            document.querySelectorAll('.nav-item').forEach(el => {
                el.classList.remove('active', 'bg-primary', 'text-white', 'shadow-lg', 'shadow-emerald-900/50');
                el.classList.add('text-slate-400');
            });
            clickedElement.classList.add('active', 'bg-primary', 'text-white', 'shadow-lg', 'shadow-emerald-900/50');
            clickedElement.classList.remove('text-slate-400');
            
            // Auto close on mobile
            if (window.innerWidth < 1024) {
                toggleSidebar();
            }
        }
    </script>
</body>
</html>
